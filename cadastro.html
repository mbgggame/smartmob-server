<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart – Cadastro do Seller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Syne',sans-serif;background:#080810;color:#f0eeff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{background:#0f0f1e;border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:2.5rem;width:100%;max-width:480px}
  .logo{font-size:2rem;font-weight:800;color:#a855f7;text-align:center;margin-bottom:0.25rem}
  .subtitle{text-align:center;font-size:0.8rem;color:#8b85a8;margin-bottom:2rem;text-transform:uppercase;letter-spacing:0.1em}
  .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;background:#161628;border-radius:10px;padding:4px}
  .tab{flex:1;padding:0.6rem;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;background:transparent;color:#8b85a8}
  .tab.active{background:#7c3aed;color:#fff}
  .form-group{margin-bottom:1rem}
  label{display:block;font-size:0.75rem;color:#8b85a8;margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
  input{width:100%;padding:0.75rem 1rem;background:#161628;border:1px solid rgba(124,58,237,0.2);border-radius:10px;color:#f0eeff;font-family:'Syne',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
  input:focus{border-color:#7c3aed}
  input::placeholder{color:#8b85a8}
  .termos-box{background:#161628;border:1px solid rgba(124,58,237,0.2);border-radius:10px;height:200px;overflow-y:auto;padding:1rem;font-size:0.75rem;color:#8b85a8;line-height:1.7;margin-bottom:1rem}
  .check-group{display:flex;align-items:flex-start;gap:10px;margin-bottom:0.75rem;font-size:0.82rem;color:#8b85a8}
  .check-group input[type=checkbox]{width:18px;height:18px;accent-color:#7c3aed;margin-top:2px;flex-shrink:0}
  .btn{width:100%;padding:0.9rem;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:0.75rem}
  .btn-primary{background:#7c3aed;color:#fff}
  .btn-primary:disabled{background:#4c1d95;color:#8b85a8;cursor:not-allowed;opacity:0.6}
  .btn-google{background:#161628;color:#f0eeff;border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;gap:10px}
  .btn-google:hover{background:#1f1f35}
  .divider{display:flex;align-items:center;gap:1rem;margin:1rem 0;color:#8b85a8;font-size:0.8rem}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(124,58,237,0.2)}
  .link{text-align:center;font-size:0.82rem;color:#8b85a8;margin-top:1rem}
  .link a{color:#a855f7;text-decoration:none}
  .msg{padding:0.75rem 1rem;border-radius:8px;font-size:0.82rem;margin-bottom:1rem;display:none}
  .msg.erro{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
  .msg.ok{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
  .aviso-scroll{font-size:0.72rem;color:#f59e0b;text-align:center;margin-bottom:0.5rem}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.4);border-radius:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Smart</div>
  <div class="subtitle">Marketplace — Cadastro do Seller</div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('email',this)">E-mail e Senha</button>
    <button class="tab" onclick="setTab('google',this)">Google</button>
  </div>
  <div id="msg" class="msg"></div>
  <div id="tab-email">
    <div class="form-group"><label>Nome completo</label><input type="text" id="nome" placeholder="Seu nome"></div>
    <div class="form-group"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com"></div>
    <div class="form-group"><label>Senha</label><input type="password" id="senha" placeholder="Mínimo 6 caracteres"></div>
    <div class="form-group"><label>Confirmar senha</label><input type="password" id="confirmar" placeholder="Repita a senha"></div>
  </div>
  <div id="tab-google" style="display:none">
    <p style="font-size:0.85rem;color:#8b85a8;margin-bottom:1rem;text-align:center">Clique em "Cadastrar com Google" abaixo. Leia e aceite os termos primeiro.</p>
  </div>
  <div class="form-group">
    <label>Termos de Uso — role até o final para aceitar</label>
    <div class="aviso-scroll" id="aviso-scroll">⚠️ Role até o fim para liberar o aceite</div>
    <div class="termos-box" id="termos-box"><div id="termos-texto">Carregando termos...</div></div>
  </div>
  <div class="check-group">
    <input type="checkbox" id="cb1" disabled>
    <label for="cb1">Li e compreendi todos os Termos de Uso, Política de Privacidade e Contrato de Adesão ao Marketplace Smart da ELVIVA GROUP LTDA (CNPJ: 62.444.354/0001-82)</label>
  </div>
  <div class="check-group">
    <input type="checkbox" id="cb2" disabled>
    <label for="cb2">Concordo com a cláusula de intermediação, inexistência de vínculo trabalhista, renúncia a ações coletivas e negociação de dados em fusões e aportes</label>
  </div>
  <button class="btn btn-primary" id="btn-cadastrar" disabled onclick="cadastrar()">Aceitar e Cadastrar</button>
  <div class="divider">ou</div>
  <button class="btn btn-google" onclick="cadastrarGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Cadastrar com Google
  </button>
  <div class="link">Já tem conta? <a href="/login">Fazer login</a></div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
const firebaseConfig = {
  apiKey:"AIzaSyDl99YsDc64dBAmsXDzE_1repj-XVwaEdQ",
  authDomain:"smartmob-d626d.firebaseapp.com",
  projectId:"smartmob-d626d",
  storageBucket:"smartmob-d626d.firebasestorage.app",
  messagingSenderId:"834995545401",
  appId:"1:834995545401:android:c6b3df05b161c110b3b4e8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
let tabAtual = 'email';
let termosLidos = false;
let textoTermo = '';
let versaoTermo = '1.0';
window.setTab = (tab, btn) => {
  tabAtual = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-email').style.display = tab==='email'?'block':'none';
  document.getElementById('tab-google').style.display = tab==='google'?'block':'none';
};
async function carregarTermos() {
  try {
    const r = await fetch('/api/v1/seller/termos');
    const data = await r.json();
    textoTermo = data.texto;
    versaoTermo = data.versao;
    document.getElementById('termos-texto').innerHTML = data.texto.replace(/\n/g,'<br>');
  } catch(e) { document.getElementById('termos-texto').textContent = 'Erro ao carregar termos.'; }
}
carregarTermos();
document.getElementById('termos-box').addEventListener('scroll', function() {
  if (!termosLidos && this.scrollTop + this.clientHeight >= this.scrollHeight - 10) {
    termosLidos = true;
    document.getElementById('cb1').disabled = false;
    document.getElementById('cb2').disabled = false;
    document.getElementById('aviso-scroll').style.display = 'none';
  }
});
function verificarBotao() {
  document.getElementById('btn-cadastrar').disabled =
    !(document.getElementById('cb1').checked && document.getElementById('cb2').checked);
}
document.getElementById('cb1').addEventListener('change', verificarBotao);
document.getElementById('cb2').addEventListener('change', verificarBotao);
function mostrarMsg(texto, tipo) {
  const el = document.getElementById('msg');
  el.textContent = texto; el.className = 'msg '+tipo; el.style.display = 'block';
}
async function salvarSeller(uid, nome, email) {
  const r = await fetch('/api/v1/seller/cadastrar', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({firebase_uid:uid, nome, email, versao_termo:versaoTermo, texto_termo:textoTermo})
  });
  return r.json();
}
window.cadastrar = async () => {
  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const confirmar = document.getElementById('confirmar').value;
  if (!nome||!email||!senha) return mostrarMsg('Preencha todos os campos.','erro');
  if (senha!==confirmar) return mostrarMsg('As senhas não coincidem.','erro');
  if (senha.length<6) return mostrarMsg('Senha deve ter no mínimo 6 caracteres.','erro');
  try {
    document.getElementById('btn-cadastrar').disabled = true;
    document.getElementById('btn-cadastrar').textContent = 'Cadastrando...';
    const cred = await createUserWithEmailAndPassword(auth, email, senha);
    await updateProfile(cred.user, {displayName: nome});
    await salvarSeller(cred.user.uid, nome, email);
    mostrarMsg('Cadastro realizado! Redirecionando...','ok');
    setTimeout(() => window.location.href='/seller', 2000);
  } catch(e) {
    document.getElementById('btn-cadastrar').disabled = false;
    document.getElementById('btn-cadastrar').textContent = 'Aceitar e Cadastrar';
    if (e.code==='auth/email-already-in-use') mostrarMsg('E-mail já cadastrado.','erro');
    else mostrarMsg('Erro: '+e.message,'erro');
  }
};
window.cadastrarGoogle = async () => {
  if (!document.getElementById('cb1').checked||!document.getElementById('cb2').checked)
    return mostrarMsg('Leia e aceite os termos antes de continuar.','erro');
  try {
    const result = await signInWithPopup(auth, provider);
    await salvarSeller(result.user.uid, result.user.displayName, result.user.email);
    mostrarMsg('Cadastro realizado! Redirecionando...','ok');
    setTimeout(() => window.location.href='/seller', 2000);
  } catch(e) { mostrarMsg('Erro Google: '+e.message,'erro'); }
};
</script>
</body>
</html>
